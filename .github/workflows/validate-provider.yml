name: Validate provider.yaml

on:
  pull_request:
    branches: [main]
    paths: ['adapters/**']

jobs:
  validate-provider-yaml:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: uv pip install --system pyyaml==6.0.2

      - name: Validate provider.yaml for new adapters
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python3 .github/scripts/validate_provider.py
